name: Bug report
description: Report a reproducible problem in Termix
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Please provide enough detail for us to reproduce and diagnose the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and concisely.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Tap or run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what actually happened instead.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide the environment details used when the bug occurred.
      value: |
        - Device:
        - ROM / OS:
        - Android version:
        - Termix version:
        - Install source:
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant logcat output, stack trace, or error message.
      render: shell
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Screenshots or screen recordings
      description: Add links or short notes for any screenshots or recordings that help explain the issue.
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context that may help reproduce or diagnose the problem.
    validations:
      required: false
