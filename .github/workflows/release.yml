name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Decode and create termix.keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 -d > /tmp/termix-keystore
          fi

      - name: Decode and create termix-signing.properties
        run: |
          if [ -n "${{ secrets.PROP }}" ]; then
            echo "${{ secrets.PROP }}" | base64 -d > /tmp/termix-signing.properties
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run checks
        run: ./gradlew testDebugUnitTest lintDebug
        env:
          KEYSTORE_FILE: /tmp/termix-keystore
          SIGNING_PROPERTIES_FILE: /tmp/termix-signing.properties

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: /tmp/termix-keystore
          SIGNING_PROPERTIES_FILE: /tmp/termix-signing.properties

      - name: Prepare release APK
        run: cp app/build/outputs/apk/release/*.apk app/termix-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/termix-${{ github.ref_name }}.apk
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Clean up signing files
        if: always()
        run: rm -f /tmp/termix-keystore /tmp/termix-signing.properties
