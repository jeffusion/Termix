name: Android CI
on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  build-release:
    name: Build Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode and create termix.keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE }}" ]; then
            echo "${{ secrets.KEYSTORE }}" | base64 -d > /tmp/termix-keystore
          fi

      - name: Decode and create termix-signing.properties
        run: |
          if [ -n "${{ secrets.PROP }}" ]; then
            echo "${{ secrets.PROP }}" | base64 -d > /tmp/termix-signing.properties
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew :app:assembleRelease :app:assembleDebug :app:testDebugUnitTest
        env:
          KEYSTORE_FILE: /tmp/termix-keystore
          SIGNING_PROPERTIES_FILE: /tmp/termix-signing.properties

      - name: Prepare GitHub Release APK
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: cp app/build/outputs/apk/release/*.apk app/termix-${{ github.ref_name }}.apk

      - name: Upload GitHub Release asset
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          files: app/termix-${{ github.ref_name }}.apk

      - name: Archive APK
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: termix-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk

      - name: Delete termix temp files
        run: rm -f /tmp/termix-keystore /tmp/termix-signing.properties
